name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, runner: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          - { target: x86_64-pc-windows-msvc, runner: windows-latest }
          - { target: aarch64-pc-windows-msvc, runner: windows-11-arm }
          - { target: x86_64-apple-darwin, runner: macos-15-intel }
          - { target: aarch64-apple-darwin, runner: macos-14 }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cargo-deny
      - name: Check portable checksum helper
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/test_checksum.py
      - name: Build CLI
        run: cargo build --locked --release --target ${{ matrix.target }} -p video-compressor
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          bash scripts/package_release.sh cli "${{ matrix.target }}" release "target/${{ matrix.target }}/release/video-compressor"
          bash scripts/verify_release.sh release
      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bash scripts/package_release.sh cli "${{ matrix.target }}" release "target/${{ matrix.target }}/release/video-compressor.exe"
          bash scripts/verify_release.sh release
      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: release/*

  desktop:
    name: Desktop ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, runner: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          - { target: x86_64-pc-windows-msvc, runner: windows-latest }
          - { target: aarch64-pc-windows-msvc, runner: windows-11-arm }
          - { target: x86_64-apple-darwin, runner: macos-15-intel }
          - { target: aarch64-apple-darwin, runner: macos-14 }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cargo-deny
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check DTO bindings without mutating the checkout
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/generate_bindings.py --check
      - run: pnpm build
      - name: Check Tauri resources
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/check_tauri_resources.py --require-frontend-dist
      - name: Build Tauri package
        run: pnpm tauri build --target ${{ matrix.target }} --ci
      - name: Package desktop bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          bash scripts/package_release.sh desktop "${{ matrix.target }}" release "target/${{ matrix.target }}/release/bundle"
          bash scripts/verify_release.sh release
      - name: Package desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bash scripts/package_release.sh desktop "${{ matrix.target }}" release "target/${{ matrix.target }}/release/bundle"
          bash scripts/verify_release.sh release
      - uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.target }}
          path: release/*

  publish:
    name: Publish release assets
    needs: [cli, desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Combine checksums and record unsigned state
        run: |
          find release-assets -type f -name '*.sha256' -print0 | xargs -0 cat > release-assets/SHA256SUMS
          echo 'signing=unsigned' > release-assets/SIGNING_STATUS.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: release-assets/**
          generate_release_notes: true
