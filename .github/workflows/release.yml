name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the generated release assets"
        required: true
        type: boolean
        default: false
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, runner: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          - { target: x86_64-pc-windows-msvc, runner: windows-latest }
          - { target: aarch64-pc-windows-msvc, runner: windows-11-arm }
          - { target: x86_64-apple-darwin, runner: macos-15-intel }
          - { target: aarch64-apple-darwin, runner: macos-14 }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cargo-deny
      - name: Run dependency policy checks
        run: cargo deny check
      - name: Check portable checksum helper
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/test_checksum.py
      - name: Build CLI
        run: cargo build --locked --release --target ${{ matrix.target }} -p video-compressor
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          bash scripts/package_release.sh cli "${{ matrix.target }}" release "target/${{ matrix.target }}/release/video-compressor"
          bash scripts/verify_release.sh release
      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bash scripts/package_release.sh cli "${{ matrix.target }}" release "target/${{ matrix.target }}/release/video-compressor.exe"
          bash scripts/verify_release.sh release
      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: release/*

  desktop:
    name: Desktop ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, runner: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          - { target: x86_64-pc-windows-msvc, runner: windows-latest }
          - { target: aarch64-pc-windows-msvc, runner: windows-11-arm }
          - { target: x86_64-apple-darwin, runner: macos-15-intel }
          - { target: aarch64-apple-darwin, runner: macos-14 }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cargo-deny
      - name: Run dependency policy checks
        run: cargo deny check
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check DTO bindings without mutating the checkout
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/generate_bindings.py --check
      - run: pnpm build
      - name: Check Tauri resources
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/check_tauri_resources.py --require-frontend-dist
      - name: Build Tauri package
        run: pnpm tauri build --target ${{ matrix.target }} --ci
      - name: Package desktop bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          bash scripts/package_release.sh desktop "${{ matrix.target }}" release "target/${{ matrix.target }}/release/bundle"
          bash scripts/verify_release.sh release
      - name: Package desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bash scripts/package_release.sh desktop "${{ matrix.target }}" release "target/${{ matrix.target }}/release/bundle"
          bash scripts/verify_release.sh release
      - uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.target }}
          path: release/*

  desktop-startup-smoke:
    name: Desktop startup smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf xvfb
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm tauri build --ci
      - name: Launch native desktop binary (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GDK_BACKEND: x11
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
        run: |
          set -euo pipefail
          binary="target/release/video-compressor-desktop"
          test -x "$binary"
          log_file="${RUNNER_TEMP}/desktop-startup.log"
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" "$binary" >"$log_file" 2>&1 &
          pid=$!
          cleanup() {
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 10); do
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "$log_file"
              exit 1
            fi
            sleep 1
          done
      - name: Launch native desktop binary (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          binary="target/release/video-compressor-desktop"
          test -x "$binary"
          log_file="${RUNNER_TEMP}/desktop-startup.log"
          "$binary" >"$log_file" 2>&1 &
          pid=$!
          cleanup() {
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 10); do
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "$log_file"
              exit 1
            fi
            sleep 1
          done
      - name: Launch native desktop binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $env:GITHUB_WORKSPACE "target/release/video-compressor-desktop.exe"
          if (!(Test-Path $binary)) { throw "missing native desktop binary: $binary" }
          $process = Start-Process -FilePath $binary -WorkingDirectory $env:GITHUB_WORKSPACE -PassThru
          try {
            Start-Sleep -Seconds 10
            if ($process.HasExited) { throw "desktop exited during startup smoke with code $($process.ExitCode)" }
          } finally {
            if (!$process.HasExited) { Stop-Process -Id $process.Id -Force }
          }

  packaged-e2e:
    name: Packaged Tauri E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Install Tauri and WebDriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf webkit2gtk-driver xvfb
          cargo install tauri-driver --locked
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo build --locked --release --features tauri/custom-protocol -p video-compressor-desktop
      - name: Prepare deterministic Tauri runtime data
        run: |
          e2e_data_dir="${RUNNER_TEMP}/video-compressor-e2e"
          mkdir -p "$e2e_data_dir/config" "$e2e_data_dir/workdir"
          printf 'fixture' > "$e2e_data_dir/e2e-input.mp4"
          export VIDEO_COMPRESSOR_DATA_DIR="$e2e_data_dir"
          export E2E_SOURCE_PATH="$e2e_data_dir/e2e-input.mp4"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          data_dir = Path(os.environ["VIDEO_COMPRESSOR_DATA_DIR"])
          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          config = {
              "schema_version": 2,
              "default_preset_name": "default_hevc",
              "keep_preview_temp": True,
              "recent_paths": [],
              "language": "en",
              "last_source_path": "",
              "last_output_dir": "",
              "workdir_path": "",
              "ffmpeg_path": str(workspace / "fixtures/fake-tools/fake-queue-hang.sh"),
              "ffprobe_path": str(workspace / "fixtures/fake-tools/fake-ffprobe.sh"),
              "log_level": "info",
              "queue_table_header_state": "",
          }
          (data_dir / "config/app_config.json").write_text(json.dumps(config), encoding="utf-8")
          PY
          echo "VIDEO_COMPRESSOR_DATA_DIR=$e2e_data_dir" >> "$GITHUB_ENV"
          echo "E2E_SOURCE_PATH=$e2e_data_dir/e2e-input.mp4" >> "$GITHUB_ENV"
      - name: Run packaged WebdriverIO smoke test
        env:
          GDK_BACKEND: x11
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
        shell: xvfb-run --auto-servernum bash {0}
        run: |
          tauri_driver_log="${RUNNER_TEMP}/tauri-driver.log"
          tauri_driver_pid=""
          cleanup() {
            if [ -n "$tauri_driver_pid" ]; then
              kill "$tauri_driver_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT
          tauri-driver > "$tauri_driver_log" 2>&1 &
          tauri_driver_pid=$!
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4444/status >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4444/status >/dev/null
          if ! pnpm --dir apps/desktop e2e; then
            cat "$tauri_driver_log"
            exit 1
          fi

  publish:
    name: Publish release assets
    needs: [cli, desktop, desktop-startup-smoke, packaged-e2e]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.publish)
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Combine checksums and record unsigned state
        run: |
          set -euo pipefail
          shopt -s nullglob
          checksums=(release-assets/*.sha256)
          test "${#checksums[@]}" -gt 0
          cat "${checksums[@]}" > release-assets/SHA256SUMS
          echo 'signing=unsigned' > release-assets/SIGNING_STATUS.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: release-assets/**
          generate_release_notes: true
