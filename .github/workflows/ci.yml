name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - name: Rust format
        run: cargo fmt --all -- --check
      - name: Rust lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Rust tests
        run: cargo test --workspace --locked
      - name: Confirm Rust commands keep the worktree clean
        shell: bash
        run: git diff --exit-code

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - name: Install Tauri Linux dependencies for DTO codegen
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check DTO bindings without mutating the checkout
        run: pnpm codegen:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:run
      - run: pnpm build
      - name: Check Tauri resources
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/check_tauri_resources.py --require-frontend-dist
      - name: Confirm frontend commands keep the worktree clean
        run: git diff --exit-code

  architecture:
    name: Architecture and dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: taiki-e/install-action@cargo-deny
      - run: python3 scripts/check_architecture.py
      - run: python3 scripts/check_tauri_resources.py
      - run: python3 scripts/test_checksum.py
      - run: cargo deny check

  desktop-check:
    name: Desktop check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check Tauri resources
        shell: bash
        run: |
          python_cmd=python3
          if ! command -v "$python_cmd" >/dev/null 2>&1; then python_cmd=python; fi
          "$python_cmd" scripts/check_tauri_resources.py --require-frontend-dist
      - run: cargo check --locked -p video-compressor-desktop --all-targets
      - name: Confirm desktop checks keep the worktree clean
        shell: bash
        run: git diff --exit-code
