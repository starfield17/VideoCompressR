name: Desktop E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "crates/**"
      - "e2e/**"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Install Tauri and WebDriver dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf webkit2gtk-driver xvfb
          cargo install tauri-driver --locked
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo build --locked --release --features tauri/custom-protocol -p video-compressor-desktop
      - name: Run WebdriverIO Tauri smoke test
        run: xvfb-run --auto-servernum pnpm --dir apps/desktop e2e

  browser:
    name: Browser-mode Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/desktop exec playwright install --with-deps chromium
      - run: pnpm test:browser
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-results
          path: test-results/browser
