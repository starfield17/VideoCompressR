[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
# Workspace-inherited dependencies are intentionally declared with
# `workspace = true`; cargo-deny reports that inheritance as a wildcard.
wildcards = "allow"
